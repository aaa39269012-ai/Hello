<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahani Play</title>

    <meta name="exoclick-site-verification" content="7aa7e1dc78a1bcabbd7faaca667b4e46">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnCCWVcNhFBTCh7Tu9ctQ7QiGasUvgw4s",
            authDomain: "kuku-1cb36.firebaseapp.com",
            projectId: "kuku-1cb36",
            storageBucket: "kuku-1cb36.firebasestorage.app",
            messagingSenderId: "1089968385102",
            appId: "1:1089968385102:web:bf53c0b9b05c5659e3671f",
            measurementId: "G-FPTKTH9QXT"
        };

        const app = initializeApp(firebaseConfig);
        getAnalytics(app);
        const db = getFirestore(app);

        window.db = db;
        window.firebaseFunctions = { collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc };
    </script>

    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        #header { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #111; display: flex; align-items: center; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        #logo { width: 36px; height: 36px; cursor: pointer; background: #444; border-radius: 50%; }
        #stories { padding: 70px 15px 20px; height: calc(100vh - 50px); overflow-y: auto; }
        .category-section { margin-bottom: 25px; }
        .category-title { font-size: 17px; font-weight: bold; margin: 15px 0 8px; padding-left: 8px; border-left: 4px solid #ff6b6b; }
        .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .story-poster { width: 100%; aspect-ratio: 3/4; border-radius: 8px; position: relative; background: #222; overflow: hidden; cursor: pointer; }
        .story-poster img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        
        /* Player & Ad Overlay */
        #player { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; }
        #video { width: 100%; height: 100%; object-fit: contain; }
        #adPlaceholder { position: absolute; inset: 0; background: #000; display: none; z-index: 2500; }
        #adIframe { width: 100%; height: 100%; border: none; }
        #closeAd { position: absolute; top: 60px; right: 20px; background: rgba(255, 0, 0, 0.8); color: #fff; border: none; padding: 10px 20px; cursor: pointer; z-index: 2600; border-radius: 5px; font-weight: bold; }

        #episodeList { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 180px; background: #1a1a1a; height: 60%; overflow-y: auto; display: none; padding: 15px; box-sizing: border-box; }
        .episode-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; font-size: 13px; }
        #toggleEpisodes, #backHome { position: absolute; top: 15px; background: #333; color: #fff; border: none; padding: 8px 12px; cursor: pointer; z-index: 10; border-radius: 4px; }
        #toggleEpisodes { right: 15px; }
        #backHome { left: 15px; }

        #admin { position: fixed; inset: 0; background: #111; display: none; z-index: 1500; padding: 12px; overflow-y: auto; box-sizing: border-box; }
        #storyForm { display: flex; flex-direction: column; gap: 8px; }
        #storyForm input { background: #222; color: #fff; padding: 9px; border: none; border-radius: 6px; }
        #storyForm button { background: #0066cc; color: #fff; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        #passModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 10px; display: none; z-index: 1600; text-align: center; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="header"><div id="logo"></div></div>
    <div id="stories"></div>

    <div id="player">
        <video id="video" controls></video>
        <div id="episodeList"></div>
        <button id="toggleEpisodes">📺 Episodes</button>
        <button id="backHome">← Back</button>
        
        <div id="adPlaceholder">
            <button id="closeAd">Skip Ad</button>
            <iframe id="adIframe" src=""></iframe>
        </div>
    </div>

    <div id="admin">
        <h2>Admin Panel</h2>
        <form id="storyForm">
            <input type="hidden" id="editId">
            <input type="text" id="category" placeholder="Category" required>
            <input type="text" id="storyName" placeholder="Story Name" required>
            <input type="url" id="posterUrl" placeholder="Poster Link" required>
            <div id="episodesContainer"></div>
            <button type="button" onclick="addEpisodeField()">+ Add Episode</button>
            <button type="submit" style="margin-top:10px;">Save Story</button>
        </form>
        <div id="storyList" style="margin-top:20px;"></div>
        <button onclick="backToHomeFromAdmin()" style="width:100%; margin-top:20px; padding:10px;">Back to App</button>
    </div>

    <div id="passModal">
        <h3>Admin Access</h3>
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkPassword()">Enter</button>
    </div>

    <script>
        let currentStory = null;
        let currentEpiIndex = 0;
        let stories = [];
        let logoClickCount = 0;

        // STEP 2: ExoClick Ad URL (Jab site verify ho jaye, tab yahan apna link dalein)
        const EXO_VAST_URL = ""; 

        document.getElementById('logo').addEventListener('click', () => {
            logoClickCount++;
            if (logoClickCount >= 3) {
                document.getElementById('passModal').style.display = 'block';
                logoClickCount = 0;
            }
        });

        function checkPassword() {
            if (document.getElementById('passInput').value === '78626') {
                document.getElementById('passModal').style.display = 'none';
                document.getElementById('admin').style.display = 'block';
                loadStoryList();
            } else { alert('Wrong Password!'); }
        }

        function addEpisodeField() {
            const container = document.getElementById('episodesContainer');
            const div = document.createElement('div');
            div.style.display = "flex";
            div.style.gap = "5px";
            div.style.marginTop = "5px";
            div.innerHTML = `<input type="number" placeholder="Ep" required style="width:50px;"><input type="url" placeholder="Video Link" required style="flex:1;"><button type="button" onclick="this.parentNode.remove()">×</button>`;
            container.appendChild(div);
        }

        document.getElementById('storyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = window.firebaseFunctions;
            const episodes = Array.from(document.querySelectorAll('#episodesContainer div')).map(row => ({
                num: parseInt(row.querySelectorAll('input')[0].value),
                link: row.querySelectorAll('input')[1].value
            })).sort((a,b) => a.num - b.num);

            const data = {
                category: document.getElementById('category').value,
                name: document.getElementById('storyName').value,
                poster: document.getElementById('posterUrl').value,
                episodes: episodes
            };

            const editId = document.getElementById('editId').value;
            if(editId) await f.updateDoc(f.doc(window.db, 'stories', editId), data);
            else await f.addDoc(f.collection(window.db, 'stories'), data);
            
            alert("Story Saved!");
            location.reload();
        });

        async function loadStories() {
            const f = window.firebaseFunctions;
            if(!f) return;
            const snap = await f.getDocs(f.collection(window.db, 'stories'));
            stories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderStories();
        }

        function renderStories() {
            const container = document.getElementById('stories');
            container.innerHTML = '';
            stories.forEach(s => {
                const div = document.createElement('div');
                div.className = 'story-poster';
                div.onclick = () => openPlayer(s);
                div.innerHTML = `<img src="${s.poster}"><div class="story-name">${s.name}</div>`;
                container.appendChild(div);
            });
        }

        function openPlayer(story) {
            currentStory = story;
            document.getElementById('stories').style.display = 'none';
            document.getElementById('header').style.display = 'none';
            document.getElementById('player').style.display = 'block';
            loadEpisode(0);
        }

        function loadEpisode(idx) {
            if (idx >= currentStory.episodes.length) return;
            currentEpiIndex = idx;
            const video = document.getElementById('video');
            video.src = currentStory.episodes[idx].link;
            
            // AbortError Fix: Ensuring playback starts safely
            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => console.log("Playback interrupted safely."));
            }

            // Ad trigger logic: Every 3rd episode
            if ((idx + 1) % 3 === 0 && EXO_VAST_URL !== "") showAd();
        }

        function showAd() {
            document.getElementById('video').pause();
            document.getElementById('adIframe').src = EXO_VAST_URL;
            document.getElementById('adPlaceholder').style.display = 'block';
        }

        function closeAd() {
            document.getElementById('adPlaceholder').style.display = 'none';
            document.getElementById('adIframe').src = "";
            document.getElementById('video').play();
        }

        document.getElementById('toggleEpisodes').onclick = () => {
            const el = document.getElementById('episodeList');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
            el.innerHTML = currentStory.episodes.map((e, i) => `<div class="episode-item" onclick="loadEpisode(${i})">Episode ${e.num}</div>`).join('');
        };

        document.getElementById('backHome').onclick = () => {
            document.getElementById('player').style.display = 'none';
            document.getElementById('header').style.display = 'flex';
            document.getElementById('stories').style.display = 'block';
            document.getElementById('video').pause();
        };

        document.getElementById('closeAd').onclick = closeAd;
        document.getElementById('video').onended = () => loadEpisode(currentEpiIndex + 1);
        
        function backToHomeFromAdmin() { document.getElementById('admin').style.display = 'none'; }
        window.onload = () => setTimeout(loadStories, 1000);
    </script>
</body>
</html>
